<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web PDF OCR Extractor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; margin-top: 50px; }
        .drop-zone { border: 2px dashed #0d6efd; padding: 40px; text-align: center; border-radius: 10px; background: #fff; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { background: #e9ecef; }
        #progressContainer { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4 text-center">Web PDF OCR Extractor</h2>
        <p class="text-center text-muted">Make scanned PDFs searchable instantly. 100% private - files never leave your browser.</p>
        
        <div class="drop-zone" id="dropZone">
            <h4>Drag & Drop your PDF here</h4>
            <p>or click to browse files</p>
            <input type="file" id="fileInput" accept="application/pdf" multiple style="opacity: 0; position: absolute; z-index: -1;">
        </div>

        <div id="fileList" class="mt-3"></div>

        <div class="mt-4 text-center">
            <button id="startBtn" class="btn btn-primary btn-lg" disabled>Make PDF(s) Searchable</button>
        </div>

        <div id="progressContainer" class="mt-4">
            <h5 id="statusText" class="text-center">Processing...</h5>
            <div class="progress">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
            </div>
            <p id="previewText" class="mt-2 text-muted text-center" style="white-space: pre-wrap; font-family: monospace;"></p>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
